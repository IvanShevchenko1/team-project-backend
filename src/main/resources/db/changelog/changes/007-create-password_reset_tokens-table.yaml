databaseChangeLog:
  - changeSet:
      id: 007-create-password_reset_tokens-table
      author: your-name
      changes:
        - createTable:
            tableName: password_reset_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: token_hash
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: used
                  type: BIT(1)
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: password_reset_tokens
            baseColumnNames: user_id
            constraintName: fk_password_reset_tokens_user
            referencedTableName: users
            referencedColumnNames: user_id
            onDelete: CASCADE