databaseChangeLog:
  - changeSet:
      id: 002-create-categories-table
      author: Ivanov
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: category_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_categories
                    nullable: false

              - column:
                  name: category_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: categories
            columnNames: category_name
            constraintName: uk_categories_category_name