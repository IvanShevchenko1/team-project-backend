databaseChangeLog:
  - changeSet:
      id: 002-create-products-table
      author: Ivanov
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: product_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_product
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: category
                  type: VARCHAR(200)
                  constraints:
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: TEXT

              - column:
                  name: city
                  type: VARCHAR(100)

              - column:
                  name: contact_phone
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: is_deleted
                  type: BIT(1)
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: DATETIME

              - column:
                  name: given_at
                  type: DATETIME

              - column:
                  name: status_changed_at
                  type: DATETIME

              - column:
                  name: archived_reason
                  type: VARCHAR(100)

        - addForeignKeyConstraint:
            constraintName: fk_product_user
            baseTableName: products
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: user_id
            onDelete: RESTRICT
            onUpdate: RESTRICT

        - createIndex:
            tableName: products
            indexName: idx_product_status
            columns:
              - column:
                  name: status

        - createIndex:
            tableName: products
            indexName: idx_product_city
            columns:
              - column:
                  name: city

        - createIndex:
            tableName: products
            indexName: idx_product_created_at
            columns:
              - column:
                  name: created_at

        - createIndex:
            tableName: products
            indexName: idx_product_given_at
            columns:
              - column:
                  name: given_at

        - createIndex:
            tableName: products
            indexName: idx_product_status_changed_at
            columns:
              - column:
                  name: status_changed_at